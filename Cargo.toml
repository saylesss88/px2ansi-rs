[package]
name = "px2ansi-rs"
version = "0.3.12"
edition = "2024"
authors = ["T. Sawyer <saylesss87@proton.me>", "Nell Fauveau <nellousan@hotmail.fr> (original Python version)"]
license = "GPL-3.0"
description = "Convert pixel art images to ANSI terminal art (Rust port)"
repository = "https://github.com/saylesss88/px2ansi-rs"
readme = "README.md"
keywords = ["ansi", "pixel-art", "terminal", "image", "cli"]
categories = ["command-line-utilities", "multimedia::images", "rendering"]
exclude = ["assets/*", "tests/*", "target/*", ".github/*", ".gitignore"]

[dependencies]
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
terminal_size = "0.4.3"
serde_json = "1.0.149"
serde = { version = "1.0.228", features = ["derive"] }
rand = "0.10.0"
colored = "3.1.1"
fuzzy-matcher = "0.3.7"
walkdir = "2.5.0"
dialoguer = { version = "0.12.0", features = ["fuzzy-select"] }
clap_complete = "4.5.66"
confy = "2.0.0"

[[bin]]
name = "px2ansi-rs"
path = "src/main.rs"

[lib]
name = "px2ansi_rs"
path = "src/lib.rs"

[profile.release]
opt-level = 3     # Maximum optimization
lto = true        # Link Time Optimization (smaller/faster binary)
codegen-units = 1 # Better optimization at the cost of slower compile time
panic = 'abort'   # Remove stack unwinding (smaller binary)
strip = true      # Automatically strip symbols (significantly smaller file)
