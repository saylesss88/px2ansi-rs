[package]
name = "px2ansi-rs"
default-run = "px2ansi-rs"
version = "0.5.19"
edition = "2024"
authors = ["T. Sawyer <saylesss87@proton.me>"]
license = "GPL-3.0"
repository = "https://github.com/saylesss88/px2ansi-rs"
readme = "README.md"
keywords = ["ansi", "pixel-art", "terminal", "rasterize", "cli"]
categories = ["command-line-utilities", "multimedia::images", "rendering"]
description = "CLI frontend for the px2ansi terminal art engine"
include = ["src/**/*", "Cargo.toml", "README.md", "LICENSE"]

[[bin]]
name = "px2ansi-rs"
path = "src/main.rs"

[[bin]]
name = "generate-manpage"
path = "src/bin/generate_manpage.rs"

[dependencies]
px2ansi = { version = "0.2.2", path = "../lib" }
anyhow = { version = "1.0" }
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5.66"
clap_mangen = "0.3.0"
serde_json = "1.0.149"
rand = "0.10.0"
colored = "3.1.1"
fuzzy-matcher = "0.3.7"
walkdir = "2.5.0"
dialoguer = { version = "0.12.0", features = ["fuzzy-select"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
serde = { version = "1.0.228", features = ["derive"] }
confy = "2.0.0"                                                                    # CLI-only config, not shared
clap_builder = "4.6.0"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"

[features]
default = ["rasterize", "sixel", "parallel"]
sixel = ["px2ansi/sixel"]
rasterize = ["px2ansi/rasterize"]
parallel = ["px2ansi/parallel"]


[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
strip = true
