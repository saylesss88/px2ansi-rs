[package]
name = "px2ansi-rs"
default-run = "px2ansi-rs"
version = "0.5.20"
edition = "2024"
authors = ["T. Sawyer <saylesss87@proton.me>"]
license = "GPL-3.0"
repository = "https://github.com/saylesss88/px2ansi-rs"
readme = "README.md"
keywords = ["ansi", "pixel-art", "terminal", "rasterize", "cli"]
categories = ["command-line-utilities", "multimedia::images", "rendering"]
description = "CLI frontend for the px2ansi terminal art engine"
include = ["src/**/*", "Cargo.toml", "README.md", "LICENSE"]

[[bin]]
name = "px2ansi-rs"
path = "src/main.rs"

[[bin]]
name = "generate-manpage"
path = "src/bin/generate_manpage.rs"

[dependencies]
px2ansi = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
clap_mangen = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
rand = { workspace = true }
colored = { workspace = true }
fuzzy-matcher = { workspace = true }
dialoguer = { workspace = true }
image = { workspace = true }
confy = "2.0.0"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"

[features]
default = ["rasterize", "sixel", "parallel", "simd"]
sixel = ["px2ansi/sixel"]
rasterize = ["px2ansi/rasterize"]
parallel = ["px2ansi/parallel"]
simd = ["px2ansi/simd"]

[lints]
workspace = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
strip = true
