[package]
name = "px2ansi"
version = "0.2.2"
edition = "2024"
authors = ["T. Sawyer <saylesss87@proton.me>"]
license = "GPL-3.0"
repository = "https://github.com/saylesss88/px2ansi-rs/tree/main/lib"
readme = "README.md"
keywords = ["ansi", "pixel-art", "terminal", "rasterize", "cli"]
categories = ["command-line-utilities", "multimedia::images", "rendering"]
description = "High-fidelity terminal art engine — ANSI, Braille, Kanji, and more"
include = ["src/**/*", "assets/IosevkaCharonMono-Regular.ttf", "Cargo.toml", "README.md", "LICENSE"]

[lib]
name = "px2ansi"
path = "src/lib.rs"

[dependencies]
image.workspace = true
anyhow = { version = "1.0" }
terminal_size = { version = "0.4.3" }
serde_json = { version = "1.0.149" }
serde = { version = "1.0.228", features = ["derive"] }
fontdue = { version = "0.9.3", optional = true }
walkdir = { version = "2.5.0" }
thiserror = "2.0.18"
viuer = { version = "0.11.0", optional = true }
rayon = { version = "1.11.0", optional = true }
wide = { version = "1.3.0", optional = true }

[dev-dependencies]
tempfile = "3.0"
image = { workspace = true }

[features]
default = ["rasterize", "sixel", "parallel"]
sixel = ["dep:viuer"]
rasterize = ["dep:fontdue"]
full = ["rasterize", "sixel", "parallel"]
parallel = ["dep:rayon"]
simd = ["dep:wide"]
